site_name: The Club Moms FAQ
site_description: Preguntas frecuentes para mamás
site_url: http://127.0.0.1:8000/

theme:
  name: material
  language: es
  favicon: assets/favicon.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: pink
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: pink
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro

nav:
  - Inicio: index.md
  - Consulta rápida:
      - Cuándo consultar: salud-alertas.md
  - Temas frecuentes:
      - APLV: aplv.md
      - Alimentación complementaria: alimentacion-complementaria.md
      - Compras: compras.md
      - Desarrollo: desarrollo.md
      - Embarazo: embarazo.md
      - Eventos: eventos.md
      - Fechas importantes: fechas-importantes.md
      - Fórmula: formula.md
      - Grupo y comunidad: grupo-y-comunidad.md
      - Hogar y ayuda: hogar-y-ayuda.md
      - Lactancia: lactancia.md
      - Mascotas: mascotas.md
      - Maternidad: maternidad.md
      - Pareja y trabajo: pareja-y-trabajo.md
      - Parto y posparto: parto-y-posparto.md
      - Productos: productos.md
      - Salud de mamá: salud-de-mama.md
      - Salud del bebé: salud-del-bebe.md
      - Seguridad y privacidad: seguridad-y-privacidad.md
      - Sueño: sueno.md
      - Vacunas: vacunas.md
      - Viajes y trámites: viajes-y-tramites.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

copyright: "Contenido informativo. No reemplaza valoración médica."
