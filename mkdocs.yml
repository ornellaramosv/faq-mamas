site_name: The Club Moms FAQ
site_description: Preguntas frecuentes para mamás
site_url: http://127.0.0.1:8000/

theme:
  name: material
  language: es
  favicon: assets/favicon.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: pink
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: pink
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro

nav:
  - Inicio: index.md
  - Consulta rápida:
      - Cuándo consultar: salud-alertas.md
  - Temas frecuentes:
      - APLV y alergias: aplv-y-alergias.md
      - Alimentación complementaria: alimentacion-complementaria.md
      - Dentición e higiene oral: denticion-e-higiene-oral.md
      - Desarrollo y estimulación: desarrollo-y-estimulacion.md
      - Embarazo: embarazo.md
      - Fórmula y lactancia mixta: formula-y-lactancia-mixta.md
      - Gases, cólicos y reflujo: gases-colicos-y-reflujo.md
      - Lactancia: lactancia.md
      - Maternidad y emociones: maternidad-y-emociones.md
      - Parto y cesárea: parto-y-cesarea.md
      - Pañales y pañalitis: panales-y-panalitis.md
      - Piel, baño y cabello: piel-bano-y-cabello.md
      - Privacidad y tecnología: privacidad-y-tecnologia.md
      - Productos recomendados: productos-recomendados.md
      - Salud del bebé: salud-del-bebe.md
      - Servicios y contactos: servicios-y-contactos.md
      - Sueño: sueno.md
      - Trabajo y maternidad: trabajo-y-maternidad.md
      - Trámites y viajes: tramites-y-viajes.md
      - Vacunas: vacunas.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

copyright: "Contenido informativo. No reemplaza valoración médica."
